<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注文書</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a56a0; --primary-light: #e8f0fb; --border: #b8c8e0;
      --bg: #f0f4fa; --white: #fff; --text: #1a1a2e; --muted: #6b7a99;
      --danger: #c0392b; --success: #1e7e34; --radius: 10px;
    }
    body { font-family: 'Hiragino Sans','Meiryo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:12px; }
    .container { max-width:1000px; margin:0 auto; }

    /* Header */
    .header { background:var(--primary); color:#fff; border-radius:var(--radius) var(--radius) 0 0; padding:16px 20px 14px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; position:relative; overflow:hidden; }
    .header::after { content:'🦷'; position:absolute; right:90px; top:50%; transform:translateY(-50%); font-size:64px; opacity:.07; pointer-events:none; }
    .header-left { display:flex; align-items:center; gap:10px; }
    .header h1 { font-size:20px; font-weight:700; letter-spacing:.06em; }
    .header-date { font-size:12px; opacity:.8; }

    /* Card */
    .card { background:var(--white); border-radius:0 0 var(--radius) var(--radius); box-shadow:0 2px 14px rgba(26,86,160,.10); overflow:hidden; }

    /* Toolbar */
    .toolbar { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1.5px solid var(--primary-light); flex-wrap:wrap; background:var(--primary-light); }
    .toolbar-title { font-size:12px; font-weight:700; color:var(--primary); letter-spacing:.06em; margin-right:auto; }
    .btn { display:inline-flex; align-items:center; gap:5px; padding:8px 16px; font-size:13px; font-weight:700; border:none; border-radius:7px; cursor:pointer; font-family:inherit; transition:background .15s,transform .1s; white-space:nowrap; }
    .btn:active { transform:scale(.96); }
    .btn-primary   { background:var(--primary); color:#fff; }
    .btn-primary:hover { background:#154a8a; }
    .btn-secondary { background:#fff; color:var(--primary); border:1.5px solid var(--primary); }
    .btn-secondary:hover { background:var(--primary-light); }
    .btn-danger  { background:#fff; color:var(--danger); border:1.5px solid var(--danger); }
    .btn-danger:hover  { background:#fdecea; }
    .btn-export  { background:#0f7a3c; color:#fff; }
    .btn-export:hover  { background:#0a5e2d; }
    .btn-image   { background:#7c3aed; color:#fff; }
    .btn-image:hover   { background:#5b21b6; }
    .btn-sm { padding:5px 11px; font-size:12px; border-radius:5px; }

    /* Table */
    .table-wrapper { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    table { width:100%; border-collapse:collapse; min-width:648px; table-layout:fixed; }
    col.col-no   { width:36px; }
    col.col-code { width:88px; }
    col.col-name { width:110px; }
    col.col-item { width:240px; }
    col.col-qty  { width:64px; }
    col.col-note { width:110px; }
    thead th { background:var(--primary); color:#fff; font-size:12px; font-weight:700; padding:10px 8px; text-align:center; white-space:nowrap; position:sticky; top:0; z-index:2; }
    tbody tr { transition:background .1s; }
    tbody tr:nth-child(odd)  { background:#fff; }
    tbody tr:nth-child(even) { background:#f5f8fd; }
    tbody tr:hover { background:#dce8fb; }
    td { padding:5px; vertical-align:middle; border-bottom:1px solid #e4eaf4; }
    td.td-no { text-align:center; font-size:11px; color:var(--muted); font-weight:700; }
    input[type="text"], input[type="number"] {
      border:1.5px solid #d0daea; border-radius:6px; padding:7px 9px; font-size:14px;
      font-family:inherit; background:transparent; color:var(--text); width:100%;
      transition:border-color .15s,box-shadow .15s,background .15s; -webkit-appearance:none;
    }
    input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 2.5px rgba(26,86,160,.13); background:#fff; }
    input.invalid { border-color:var(--danger) !important; }
    input.code-input { text-align:center; letter-spacing:.12em; font-weight:700; }
    input.qty-input  { text-align:center; }

    /* カスタム予測変換ドロップダウン */
    .ac-dropdown {
      position: fixed;
      background: #fff;
      border: 1.5px solid var(--primary);
      border-top: none;
      border-radius: 0 0 9px 9px;
      box-shadow: 0 8px 24px rgba(26,86,160,.18);
      z-index: 9000;
      max-height: 220px;
      overflow-y: auto;
      display: none;
    }
    .ac-item {
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid #e8eef6;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.selected {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 700;
    }

    /* Saved list */
    .saved-panel { margin-top:14px; background:var(--white); border-radius:var(--radius); box-shadow:0 2px 10px rgba(26,86,160,.08); overflow:hidden; }
    .saved-header { padding:11px 16px; background:var(--primary-light); font-size:12px; font-weight:700; color:var(--primary); letter-spacing:.06em; }
    .saved-item { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid #e8eef6; flex-wrap:wrap; }
    .saved-item:last-child { border-bottom:none; }
    .saved-item-info { flex:1; min-width:120px; }
    .saved-item-title { font-size:13px; font-weight:700; }
    .saved-item-meta  { font-size:11px; color:var(--muted); margin-top:2px; }
    .saved-actions { display:flex; gap:6px; }
    .empty-msg { padding:22px; text-align:center; color:var(--muted); font-size:13px; }

    /* 顧客マスタパネル */
    .master-panel { margin-top:14px; background:var(--white); border-radius:var(--radius); box-shadow:0 2px 10px rgba(26,86,160,.08); overflow:hidden; }
    .master-header { padding:11px 16px; background:#e8f8f0; font-size:12px; font-weight:700; color:#1e7e34; letter-spacing:.06em; }
    .master-add { display:flex; gap:8px; padding:12px 16px; border-bottom:1.5px solid #d4eedb; flex-wrap:wrap; align-items:center; background:#f4fbf6; }
    .master-add-label { font-size:11px; font-weight:700; color:#1e7e34; white-space:nowrap; }
    .master-name-inp { flex:1; min-width:130px; }
    .master-code-inp { width:90px; text-align:center; font-weight:700; letter-spacing:.1em; }
    .master-item { display:flex; align-items:center; gap:10px; padding:9px 16px; border-bottom:1px solid #e8eef6; }
    .master-item:last-child { border-bottom:none; }
    .master-item-name { flex:1; font-size:13px; font-weight:700; }
    .master-item-code { font-size:13px; color:var(--primary); font-weight:700; letter-spacing:.1em; min-width:56px; }

    /* AC ドロップダウン：医院名モードのコード表示 */
    .ac-item-sub { float:right; margin-left:10px; font-size:11px; color:var(--primary); font-weight:700; letter-spacing:.08em; }

    /* 画像プレビューモーダル */
    .img-modal-backdrop {
      position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:9500;
      display:flex; align-items:center; justify-content:center; padding:16px;
    }
    .img-modal {
      background:#fff; border-radius:16px; width:100%; max-width:520px;
      max-height:92vh; display:flex; flex-direction:column; overflow:hidden;
      box-shadow:0 8px 40px rgba(0,0,0,.28);
    }
    .img-modal-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 18px; border-bottom:1px solid #e4eaf4; flex-shrink:0;
    }
    .img-modal-title { font-weight:700; font-size:15px; color:var(--primary); }
    .img-modal-close {
      background:none; border:none; font-size:24px; cursor:pointer;
      color:var(--muted); line-height:1; padding:2px 6px; border-radius:6px;
    }
    .img-modal-close:hover { background:#f0f4fa; }
    .img-modal-body {
      overflow:auto; flex:1; padding:14px; text-align:center; background:#f5f8fd;
    }
    .img-modal-body img { max-width:100%; border-radius:8px; box-shadow:0 2px 14px rgba(0,0,0,.14); }
    .img-modal-foot {
      display:flex; gap:10px; padding:14px 18px; border-top:1px solid #e4eaf4; flex-shrink:0;
    }
    .img-modal-foot .btn { flex:1; justify-content:center; padding:13px 10px; font-size:14px; }

    /* 入力ナビゲーションバー */
    .nav-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #e8f0fb; border-top: 2px solid var(--primary);
      display: none; gap: 10px; padding: 8px 14px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 8000;
    }
    .nav-bar.show { display: flex; }
    .nav-btn {
      flex: 1; padding: 11px 8px; font-size: 15px; font-weight: 700;
      border: 1.5px solid var(--primary); border-radius: 8px;
      background: #fff; color: var(--primary); cursor: pointer;
      font-family: inherit; letter-spacing: .04em;
    }
    .nav-btn:active { background: var(--primary-light); }

    /* Toast */
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(70px); background:#1a1a2e; color:#fff; padding:11px 24px; border-radius:28px; font-size:13px; font-weight:700; box-shadow:0 4px 20px rgba(0,0,0,.22); transition:transform .28s cubic-bezier(.22,1,.36,1),opacity .28s; opacity:0; z-index:9999; pointer-events:none; }
    #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
    #toast.success { background:var(--success); }
    #toast.error   { background:var(--danger); }

    /* Print */
    @media print {
      body { background:#fff; padding:0; }
      .no-print { display:none !important; }
      .card { box-shadow:none; border-radius:0; }
      .header { border-radius:0; print-color-adjust:exact; -webkit-print-color-adjust:exact; }
      thead th { print-color-adjust:exact; -webkit-print-color-adjust:exact; }
      .table-wrapper { overflow:visible; }
      table { min-width:unset; }
      input { border:1px solid #ccc !important; box-shadow:none !important; background:#fff !important; }
    }
  </style>
</head>

    </div>

      <table id="orderTable">

      <button class="btn btn-export btn-sm" onclick="addMasterEntryUI()">＋ 登録</button>
    </div>
    <div id="masterList"></div>
  </div>
</div>

    return str
      .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
      .replace(/[ァ-ヶー]/g, s => KANA_MAP[s] || s);
  }

  // 半角変換ハンドラを付与（カタカナ・アルファベット）
  function addHalfWidthHandlers(input) {
    // 非IME入力はリアルタイム変換
    input.addEventListener('input', e => {
      if (e.isComposing) return;
      input.value = toHalfWidth(input.value);
    });
    // IME確定後：setTimeout(0)で遅延→フォーカス移動が完了してから変換（ナビ干渉なし）
    input.addEventListener('compositionend', () => {
      setTimeout(() => { input.value = toHalfWidth(input.value); }, 0);
    });
  }

  // ── 入力ナビゲーションバー（◀前へ / 次へ▶）
  const navBar = document.createElement('div');
  navBar.className = 'nav-bar no-print';
  navBar.innerHTML = `<button class="nav-btn" id="navPrev">◀ 前へ</button><button class="nav-btn" id="navNext">次へ ▶</button>`;
  document.body.appendChild(navBar);
  let navFocused = null;

  function getAllTableInputs() {
    return [...document.querySelectorAll('#orderBody input')];
  }
  function moveNav(dir) {
    const all = getAllTableInputs();
    const i = navFocused ? all.indexOf(navFocused) : -1;
    const target = all[i + dir];
    if (target) { target.focus(); target.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
  }
  document.getElementById('navPrev').addEventListener('pointerdown', e => { e.preventDefault(); moveNav(-1); });
  document.getElementById('navNext').addEventListener('pointerdown', e => { e.preventDefault(); moveNav(1); });

  // ── カスタム予測変換ドロップダウン
  const acEl = document.createElement('div');
  acEl.className = 'ac-dropdown';
  document.body.appendChild(acEl);

  let acInput    = null;       // 現在フォーカス中のinput
  let acItems    = [];         // 表示中の候補（文字列）
  let acItemsFull= [];         // 候補のフルデータ（clinic mode では {name,code}）
  let acIdx      = -1;         // キーボードで選択中のインデックス
  let acMode     = 'product';  // 'product' | 'clinic'
  let acCodeRef  = null;       // clinic mode: 顧客コードinputの参照

  function showAC(input) {
    acMode = 'product'; acCodeRef = null;
    acInput = input;
    const val = input.value.trim();
    const products = getProducts();
    acItems = (val ? products.filter(p => p.includes(val)) : products).slice(0, 20);
    acItemsFull = acItems.map(() => null);

    if (!acItems.length) { hideAC(); return; }

    acEl.innerHTML = acItems.map((p, i) =>
      `<div class="ac-item" data-i="${i}">${escHtml(p)}</div>`
    ).join('');
    acIdx = -1;

    const rect = input.getBoundingClientRect();
    acEl.style.left  = rect.left + 'px';
    acEl.style.top   = (rect.bottom + 2) + 'px';
    acEl.style.width = Math.max(rect.width, 180) + 'px';
    acEl.style.display = 'block';
  }

  function showClinicAC(nameInput, codeInput) {
    acMode = 'clinic'; acCodeRef = codeInput;
    acInput = nameInput;
    const val = nameInput.value.trim();
    const normVal = toHalfWidth(val);
    const master = getMaster();
    const filtered = (val ? master.filter(m => toHalfWidth(m.name).includes(normVal)) : master).slice(0, 20);
    acItems = filtered.map(m => m.name);
    acItemsFull = filtered;

    if (!acItems.length) { hideAC(); return; }

    acEl.innerHTML = filtered.map((m, i) =>
      `<div class="ac-item" data-i="${i}">${escHtml(m.name)}<span class="ac-item-sub">${escHtml(m.code)}</span></div>`
    ).join('');
    acIdx = -1;

    const rect = nameInput.getBoundingClientRect();
    acEl.style.left  = rect.left + 'px';
    acEl.style.top   = (rect.bottom + 2) + 'px';
    acEl.style.width = Math.max(rect.width, 200) + 'px';
    acEl.style.display = 'block';
  }

  function hideAC() {
    acEl.style.display = 'none';
    acInput = null;
    acItems = [];
    acItemsFull = [];
    acIdx   = -1;
    acMode  = 'product';
    acCodeRef = null;
  }

  function updateACHighlight() {
    acEl.querySelectorAll('.ac-item').forEach((el, i) => {
      el.classList.toggle('selected', i === acIdx);
      if (i === acIdx) el.scrollIntoView({ block:'nearest' });
    });
  }

  function selectAC(i) {
    if (acInput && acItems[i] !== undefined) {
      const inp     = acInput;       // hideAC()の前に参照を保存
      const mode    = acMode;
      const codeRef = acCodeRef;
      const name    = acItems[i];
      const data    = acItemsFull[i];

      inp.value = name;

      if (mode === 'clinic') {
        if (codeRef && data && data.code) {
          codeRef.value = data.code;
          validateCodeInput(codeRef);
        }
      } else {
        saveProduct(name);
      }
      hideAC();
      inp.focus();
    }
  }

  // ドロップダウンのクリック／タッチ
  acEl.addEventListener('mousedown', e => { e.preventDefault(); }); // blur防止（PC）
  acEl.addEventListener('touchend', e => {                          // タップ選択（スマホ）
    const item = e.target.closest('.ac-item');
    if (item) { e.preventDefault(); selectAC(Number(item.dataset.i)); }
  });
  acEl.addEventListener('click', e => {                             // クリック選択（PC）
    const item = e.target.closest('.ac-item');
    if (item) selectAC(Number(item.dataset.i));
  });

  // スクロール・リサイズ時は閉じる
  window.addEventListener('scroll', hideAC, { passive: true });
  window.addEventListener('resize', hideAC, { passive: true });

  // 外部クリックで閉じる
  document.addEventListener('mousedown', e => {
    if (acEl.style.display === 'block' && !acEl.contains(e.target) && e.target !== acInput) {
      hideAC();
    }
  });

  // ── 初期化
  function init() {
    setHeaderDate();
    buildRows(DEFAULT_ROWS);
    setupNavBar();
    renderSaved();
    // マスタバージョンが古い（または未設定）なら初期データで上書きマージ
    if (localStorage.getItem(MASTER_VER_KEY) !== MASTER_VERSION) {
      const current = getMaster();
      // DEFAULT_MASTER にない手動追加分だけ残してマージ
      const defaultNames = new Set(DEFAULT_MASTER.map(m => m.name));
      const userAdded = current.filter(m => !defaultNames.has(m.name));
      localStorage.setItem(MASTER_KEY, JSON.stringify([...DEFAULT_MASTER, ...userAdded]));
      localStorage.setItem(MASTER_VER_KEY, MASTER_VERSION);
    }
    renderMasterPanel();
    // マスタ登録フォームのコードinputは数字のみ
    document.getElementById('masterCodeInput').addEventListener('input', function() {
      this.value = this.value.replace(/[^0-9]/g, '').slice(0, 5);
    });
    // Enterキーで登録
    document.getElementById('masterNameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('masterCodeInput').focus();
    });
    document.getElementById('masterCodeInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addMasterEntryUI();
    });
  }

  // ナビバーのfocus監視（focusin/focusoutはバブリングするので確実）
  function setupNavBar() {
    const tbody = document.getElementById('orderBody');

    tbody.addEventListener('focusin', e => {
      if (e.target.tagName === 'INPUT') {
        navFocused = e.target;
        navBar.classList.add('show');
        positionNavBar();
      }
    });
    tbody.addEventListener('focusout', e => {
      if (e.target.tagName === 'INPUT') {
        setTimeout(() => {
          if (!tbody.querySelector('input:focus')) {
            navBar.classList.remove('show');
            navFocused = null;
          }
        }, 120);
      }
    });

    // Visual Viewport API：キーボードが出たときバーをキーボードの直上に配置
    function positionNavBar() {
      if (!window.visualViewport) return;
      const vv = window.visualViewport;
      const kbHeight = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      navBar.style.bottom = kbHeight + 'px';
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', positionNavBar);
      window.visualViewport.addEventListener('scroll', positionNavBar);
    }
  }

  function setHeaderDate() {
    const now = new Date();
    document.getElementById('headerDate').textContent =
      `${now.getFullYear()}年${String(now.getMonth()+1).padStart(2,'0')}月${String(now.getDate()).padStart(2,'0')}日`;
  }

  // ── 行生成
  function buildRows(count) {
    const tbody = document.getElementById('orderBody');
    const start = tbody.rows.length + 1;
    for (let i = 0; i < count; i++) tbody.appendChild(makeRow(start + i));
  }

  function makeRow(n) {
    const tr = document.createElement('tr');
    tr.dataset.row = n;
    tr.innerHTML = `
      <td class="td-no">${n}</td>
      <td><input type="text" class="code-input" placeholder="00000" maxlength="5" inputmode="numeric" autocomplete="off"></td>
      <td><input type="text" inputmode="text" placeholder="医院名"></td>
      <td><input type="text" class="item-input" inputmode="text" placeholder="商品名"></td>
      <td><input type="text" class="qty-input" placeholder="0" maxlength="4" inputmode="numeric" autocomplete="off"></td>
      <td><input type="text" inputmode="text" placeholder="備考"></td>
    `;

    const inputs = tr.querySelectorAll('input');
    const [codeInput, nameInput, itemInput, qtyInput, noteInput] = inputs;

    // 顧客コード：数字のみ ＋ 5桁揃ったら医院名を自動入力
    codeInput.addEventListener('input', () => {
      codeInput.value = codeInput.value.replace(/[^0-9]/g, '').slice(0, 5);
      validateCodeInput(codeInput);
      const name = lookupMasterByCode(codeInput.value);
      if (name !== null) nameInput.value = name;
    });

    // 歯科医院名：マスタAC ＋ コード自動入力（医院名は変換しない）
    function applyClinicLogic() {
      const code = lookupMaster(nameInput.value.trim());
      if (code !== null) { codeInput.value = code; validateCodeInput(codeInput); }
    }
    nameInput.addEventListener('input', e => {
      if (e.isComposing) return;
      applyClinicLogic();
      showClinicAC(nameInput, codeInput);
    });
    nameInput.addEventListener('compositionend', () => {
      setTimeout(() => {
        applyClinicLogic();
        if (document.activeElement === nameInput) showClinicAC(nameInput, codeInput);
      }, 0);
    });
    nameInput.addEventListener('blur', () => {
      setTimeout(() => { if (acInput === nameInput) hideAC(); }, 160);
    });
    nameInput.addEventListener('keydown', e => {
      if (acEl.style.display !== 'block' || acInput !== nameInput) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); acIdx = Math.min(acIdx+1, acItems.length-1); updateACHighlight(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); acIdx = Math.max(acIdx-1, -1); updateACHighlight(); }
      else if (e.key === 'Enter' && acIdx >= 0) { e.preventDefault(); selectAC(acIdx); }
      else if (e.key === 'Escape') { hideAC(); }
    });

    // 備考：カタカナ・アルファベットを自動半角化
    addHalfWidthHandlers(noteInput);

    // 個数：数字のみ（全角→半角変換）
    qtyInput.addEventListener('input', () => {
      qtyInput.value = qtyInput.value
        .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
        .replace(/[^0-9]/g, '')
        .slice(0, 4);
    });

    // 商品名：半角変換 ＋ カスタム予測変換
    itemInput.addEventListener('input', e => {
      if (!e.isComposing) itemInput.value = toHalfWidth(itemInput.value);
      showAC(itemInput);
    });
    itemInput.addEventListener('compositionend', () => {
      setTimeout(() => {
        itemInput.value = toHalfWidth(itemInput.value);
        if (document.activeElement === itemInput) showAC(itemInput);
      }, 0);
    });
    itemInput.addEventListener('blur', () => {
      // value変更なし（blur中の代入はAndroidナビを壊す）
      setTimeout(() => { if (acInput === itemInput) hideAC(); }, 160);
      const v = itemInput.value.trim();
      if (v) saveProduct(v);
    });
    itemInput.addEventListener('keydown', e => {
      if (acEl.style.display !== 'block') return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        acIdx = Math.min(acIdx + 1, acItems.length - 1);
        updateACHighlight();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        acIdx = Math.max(acIdx - 1, -1);
        updateACHighlight();
      } else if (e.key === 'Enter' && acIdx >= 0) {
        e.preventDefault();
        selectAC(acIdx);
      } else if (e.key === 'Escape') {
        hideAC();
      }
    });

    return tr;
  }

  function validateCodeInput(input) {
    const v = input.value;
    input.classList.toggle('invalid', v.length > 0 && v.length !== 5);
  }

  function addRows(n) { buildRows(n); showToast(`${n}行追加しました`); }

  // ── 予測変換候補（localStorage）
  function getProducts() {
    try { return JSON.parse(localStorage.getItem(PRODUCTS_KEY)) || []; }
    catch { return []; }
  }
  function saveProduct(name) {
    let list = getProducts();
    if (list.includes(name)) return;
    list.unshift(name);
    list = list.slice(0, 200);
    localStorage.setItem(PRODUCTS_KEY, JSON.stringify(list));
  }

  // ── 顧客マスタ（localStorage: dental_master）
  function getMaster() {
    try { return JSON.parse(localStorage.getItem(MASTER_KEY)) || []; }
    catch { return []; }
  }
  function saveMasterEntry(name, code) {
    const list = getMaster();
    const idx = list.findIndex(m => m.name === name);
    if (idx >= 0) { list[idx].code = code; }
    else { list.push({ name, code }); }
    localStorage.setItem(MASTER_KEY, JSON.stringify(list));
  }
  function lookupMaster(name) {
    if (!name) return null;
    // 全角・半角どちらで入力しても一致するよう両側を正規化して比較
    const norm = toHalfWidth(name);
    const entry = getMaster().find(m => toHalfWidth(m.name) === norm);
    return entry ? entry.code : null;
  }
  function lookupMasterByCode(code) {
    if (!code || code.length !== 5) return null;
    const entry = getMaster().find(m => m.code === code);
    return entry ? entry.name : null;
  }

  // マスタパネル UI
  function renderMasterPanel() {
    const list = getMaster();
    const el = document.getElementById('masterList');
    if (!list.length) {
      el.innerHTML = '<div class="empty-msg">登録がありません。歯科医院名と顧客コードを追加してください。</div>';
      return;
    }
    el.innerHTML = '';
    list.forEach((m, i) => {
      const div = document.createElement('div');
      div.className = 'master-item';
      div.innerHTML = `
        <span class="master-item-name">${escHtml(m.name)}</span>
        <span class="master-item-code">${escHtml(m.code)}</span>
        <button class="btn btn-danger btn-sm" data-midx="${i}">削除</button>
      `;
      el.appendChild(div);
    });
    el.querySelectorAll('[data-midx]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = Number(btn.dataset.midx);
        const list2 = getMaster();
        const entry = list2[idx];
        if (!entry) return;
        if (!confirm(`「${entry.name}」を削除しますか？`)) return;
        list2.splice(idx, 1);
        localStorage.setItem(MASTER_KEY, JSON.stringify(list2));
        renderMasterPanel();
        showToast('削除しました');
      });
    });
  }

  function addMasterEntryUI() {
    const nameEl = document.getElementById('masterNameInput');
    const codeEl = document.getElementById('masterCodeInput');
    const name = nameEl.value.trim();
    const code = codeEl.value.trim().replace(/[^0-9]/g, '');
    if (!name) { showToast('歯科医院名を入力してください', 'error'); nameEl.focus(); return; }
    if (!code || code.length !== 5) { showToast('顧客コードは5桁で入力してください', 'error'); codeEl.focus(); return; }
    saveMasterEntry(name, code);
    nameEl.value = ''; codeEl.value = '';
    renderMasterPanel();
    showToast(`「${name}」を登録しました`, 'success');
  }

  // ── データ取得 / セット
  function getRows() {
    return [...document.querySelectorAll('#orderBody tr')].map(tr => {
      const inp = tr.querySelectorAll('input');
      return { code:inp[0].value.trim(), clinic:inp[1].value.trim(), item:inp[2].value.trim(), qty:inp[3].value, note:inp[4].value.trim() };
    });
  }
  function setRows(rows) {
    while (document.getElementById('orderBody').rows.length < rows.length)
      buildRows(rows.length - document.getElementById('orderBody').rows.length);
    rows.forEach((r, i) => {
      const inp = document.getElementById('orderBody').rows[i].querySelectorAll('input');
      inp[0].value = r.code||''; inp[1].value = r.clinic||''; inp[2].value = r.item||'';
      inp[3].value = r.qty||'';  inp[4].value = r.note||'';
    });
  }

  // ── バリデーション
  function validateAll() {
    let hasEntry = false, codeError = false;
    document.querySelectorAll('#orderBody tr').forEach(tr => {
      const inp = tr.querySelectorAll('input');
      const code=inp[0].value.trim(), clinic=inp[1].value.trim(), item=inp[2].value.trim(), qty=inp[3].value;
      if (code||clinic||item||qty) hasEntry = true;
      if (code && code.length !== 5) { inp[0].classList.add('invalid'); codeError = true; }
    });
    if (!hasEntry)  { showToast('1行以上入力してください','error'); return false; }
    if (codeError)  { showToast('顧客コードは5桁で入力してください','error'); return false; }
    return true;
  }

  // ── 保存
  function saveSheet() {
    if (!validateAll()) return;
    const rows = getRows().filter(r => r.code||r.clinic||r.item||r.qty);
    if (!rows.length) { showToast('入力がありません','error'); return; }
    rows.forEach(r => { if (r.item) saveProduct(r.item); });
    const saved = loadSaved();
    const now = new Date();
    saved.unshift({ id:Date.now(), date:`${now.getFullYear()}年${String(now.getMonth()+1).padStart(2,'0')}月${String(now.getDate()).padStart(2,'0')}日`, rows });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    renderSaved();
    showToast('保存しました','success');
  }

  function loadSaved() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; } catch { return []; } }

  function renderSaved() {
    const saved = loadSaved();
    const el = document.getElementById('savedList');
    if (!saved.length) { el.innerHTML='<div class="empty-msg">保存済みの注文書はありません</div>'; return; }
    el.innerHTML = '';
    saved.forEach(s => {
      const clinics = [...new Set(s.rows.filter(r=>r.clinic).map(r=>r.clinic))].slice(0,3).join('、');
      const div = document.createElement('div');
      div.className = 'saved-item';
      div.innerHTML = `
        <div class="saved-item-info">
          <div class="saved-item-title">${escHtml(s.date)}</div>
          <div class="saved-item-meta">${escHtml(clinics||'（医院名なし）')}　計${s.rows.length}行</div>
        </div>
        <div class="saved-actions">
          <button class="btn btn-secondary btn-sm" onclick="loadSheet(${s.id})">読込</button>
          <button class="btn btn-danger btn-sm"    onclick="deleteSheet(${s.id})">削除</button>
        </div>`;
      el.appendChild(div);
    });
  }

  function loadSheet(id) {
    const s = loadSaved().find(x => x.id === id);
    if (!s) return;
    clearAllRows(); setRows(s.rows);
    window.scrollTo({top:0,behavior:'smooth'});
    showToast('読み込みました','success');
  }
  function deleteSheet(id) {
    if (!confirm('削除しますか？')) return;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(loadSaved().filter(x=>x.id!==id)));
    renderSaved(); showToast('削除しました');
  }
  function clearAllRows() {
    document.querySelectorAll('#orderBody tr input').forEach(inp => { inp.value=''; inp.classList.remove('invalid'); });
  }
  function clearSheet() {
    if (!confirm('入力内容をすべてクリアしますか？')) return;
    clearAllRows(); showToast('クリアしました');
  }

  // ── 画像出力
  async function exportImage() {
    const rows = getRows().filter(r => r.code||r.clinic||r.item||r.qty);
    if (!rows.length) { showToast('データがありません','error'); return; }

    const DPR=2, PAD=20, TITLE_H=48, HEAD_H=40, ROW_H=36, FOOT_H=20;

    const COLS = [
      { label:'No.',     minW:36,  align:'center' },
      { label:'顧客コード', minW:88,  align:'center' },
      { label:'歯科医院名', minW:100, align:'left'   },
      { label:'商品名',   minW:120, align:'left'   },
      { label:'個数',     minW:50,  align:'center' },
      { label:'備考',     minW:80,  align:'left'   },
    ];

    const tmp = document.createElement('canvas').getContext('2d');
    const fBold = (s) => `bold ${s}px 'Hiragino Sans',Meiryo,sans-serif`;
    const fNorm = (s) => `${s}px 'Hiragino Sans',Meiryo,sans-serif`;

    COLS.forEach((col, ci) => {
      tmp.font = fBold(12);
      let max = tmp.measureText(col.label).width;
      rows.forEach((row, ri) => {
        const val = String([ri+1, row.code, row.clinic, row.item, row.qty, row.note][ci] ?? '');
        tmp.font = fNorm(13);
        max = Math.max(max, tmp.measureText(val).width);
      });
      col.w = Math.max(col.minW, Math.ceil(max) + 24);
    });

    const TABLE_W = COLS.reduce((s,c) => s+c.w, 0);
    const CANVAS_W = TABLE_W + PAD*2;
    const CANVAS_H = TITLE_H + HEAD_H + rows.length*ROW_H + FOOT_H;

    const canvas = document.createElement('canvas');
    canvas.width  = CANVAS_W * DPR;
    canvas.height = CANVAS_H * DPR;
    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);

    ctx.fillStyle = '#f0f4fa';
    ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

    ctx.fillStyle = '#1a56a0';
    ctx.fillRect(0,0,CANVAS_W,TITLE_H);
    ctx.fillStyle = '#fff';
    ctx.font = fBold(18); ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
    ctx.fillText('📋 注文書', PAD, TITLE_H/2);
    const now = new Date();
    ctx.font = fNorm(12); ctx.textAlign = 'right';
    ctx.fillText(`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`, CANVAS_W-PAD, TITLE_H/2);

    const tableTop = TITLE_H;
    ctx.fillStyle = '#1a56a0';
    ctx.fillRect(PAD, tableTop, TABLE_W, HEAD_H);
    let cx = PAD;
    COLS.forEach((col, ci) => {
      if (ci > 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cx,tableTop+6); ctx.lineTo(cx,tableTop+HEAD_H-6); ctx.stroke();
      }
      ctx.fillStyle = '#fff'; ctx.font = fBold(12); ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
      ctx.fillText(col.label, cx+col.w/2, tableTop+HEAD_H/2);
      cx += col.w;
    });

    rows.forEach((row, i) => {
      const y = tableTop + HEAD_H + i*ROW_H;
      const vals = [i+1, row.code, row.clinic, row.item, row.qty, row.note];
      ctx.fillStyle = i%2===0 ? '#ffffff' : '#f0f5fc';
      ctx.fillRect(PAD, y, TABLE_W, ROW_H);
      ctx.strokeStyle = '#d8e4f0'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(PAD,y+ROW_H); ctx.lineTo(PAD+TABLE_W,y+ROW_H); ctx.stroke();
      let cx2 = PAD;
      COLS.forEach((col, ci) => {
        if (ci > 0) {
          ctx.strokeStyle = '#e4eaf4'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(cx2,y+4); ctx.lineTo(cx2,y+ROW_H-4); ctx.stroke();
        }
        const val = String(vals[ci]??'');
        ctx.fillStyle = ci===0 ? '#9ba8c0' : '#1a1a2e';
        ctx.font = (ci===1 && val.length===5) ? fBold(13) : fNorm(13);
        ctx.textBaseline = 'middle';
        ctx.textAlign = col.align==='center' ? 'center' : 'left';
        const tx = col.align==='center' ? cx2+col.w/2 : cx2+10;
        ctx.fillText(val, tx, y+ROW_H/2);
        cx2 += col.w;
      });
    });

    ctx.strokeStyle = '#b8c8e0'; ctx.lineWidth = 1.5;
    ctx.strokeRect(PAD, tableTop, TABLE_W, HEAD_H+rows.length*ROW_H);

    const now2 = new Date();
    const stamp = `${now2.getFullYear()}${String(now2.getMonth()+1).padStart(2,'0')}${String(now2.getDate()).padStart(2,'0')}`;
    const filename = `注文書_${stamp}.png`;

    canvas.toBlob(blob => showImageModal(blob, filename), 'image/png');
  }

  // ── 画像プレビューモーダル
  function showImageModal(blob, filename) {
    const url = URL.createObjectURL(blob);

    const backdrop = document.createElement('div');
    backdrop.className = 'img-modal-backdrop';
    backdrop.innerHTML = `
      <div class="img-modal">
        <div class="img-modal-head">
          <span class="img-modal-title">📋 注文書画像</span>
          <button class="img-modal-close" id="_imgClose">×</button>
        </div>
        <div class="img-modal-body">
          <img src="${url}" alt="注文書">
        </div>
        <div class="img-modal-foot">
          <button class="btn btn-export" id="_imgSave">💾 画像を保存</button>
          <button class="btn btn-image"  id="_imgShare">📤 共有する</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);

    function close() {
      document.body.removeChild(backdrop);
      URL.revokeObjectURL(url);
    }

    document.getElementById('_imgClose').addEventListener('click', close);
    backdrop.addEventListener('click', e => { if (e.target === backdrop) close(); });

    // 保存ボタン：端末に直接ダウンロード
    document.getElementById('_imgSave').addEventListener('click', () => {
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      showToast('画像を保存しました', 'success');
    });

    // 共有ボタン：Web Share API → LINEなどで送る
    document.getElementById('_imgShare').addEventListener('click', async () => {
      if (navigator.canShare) {
        const file = new File([blob], filename, { type: 'image/png' });
        if (navigator.canShare({ files: [file] })) {
          try { await navigator.share({ files: [file], title: filename }); return; }
          catch(e) { if (e.name === 'AbortError') return; }
        }
      }
      // Web Share 非対応の場合はダウンロード
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      showToast('画像を保存しました', 'success');
    });
  }

  // ── CSV出力
  function exportCSV() {
    const rows = getRows().filter(r => r.code||r.clinic||r.item||r.qty);
    if (!rows.length) { showToast('エクスポートするデータがありません','error'); return; }
    const headers = ['No.','顧客コード','歯科医院名','商品名','個数','備考'];
    const csvRows = [headers, ...rows.map((r,i)=>[i+1,r.code,r.clinic,r.item,r.qty,r.note])];
    const escape = v => '"'+String(v??'').replace(/"/g,'""')+'"';
    const csvText = '﻿' + csvRows.map(r=>r.map(escape).join(',')).join('\r\n');
    const now = new Date();
    const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    const filename = `注文書_${stamp}.csv`;
    const blob = new Blob([csvText],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    showToast(`${filename} を保存しました`,'success');
  }

  function printSheet() { window.print(); }

  function escHtml(str) {
    return String(str??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg,type='') {
    const el=document.getElementById('toast');
    el.textContent=msg; el.className='show'+(type?' '+type:'');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>{el.className='';},2600);
  }

  init();
</script>
</body>
</html>
